name: Build voidarm64 ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build voidarm64 + Hyprland ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Install dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        # Remove third-party apt sources that break multi-arch
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list
        sudo rm -f /etc/apt/sources.list.d/github-cli.list
        sudo rm -f /etc/apt/sources.list.d/mono-official*.list
        sudo rm -f /etc/apt/sources.list.d/*.sources
        # Pin existing repos to amd64 only
        sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
        for f in /etc/apt/sources.list.d/*.list; do
          [ -f "$f" ] && sudo sed -i 's/^deb /deb [arch=amd64] /g' "$f" || true
        done
        # Remove hooks that fail on GitHub Actions (no dbus/systemd)
        sudo rm -f /etc/apt/apt.conf.d/*needrestart*
        sudo rm -f /etc/apt/apt.conf.d/*packagekit*
        sudo rm -f /usr/lib/needrestart/apt-pinvoke
        sudo rm -f /usr/share/dbus-1/system-services/org.freedesktop.PackageKit.service
        printf 'DPkg::Post-Invoke { "true"; };\nAPT::Update::Post-Invoke { "true"; };\n' \
          | sudo tee /etc/apt/apt.conf.d/00no-hooks
        # Add Ubuntu ports for arm64 packages
        sudo dpkg --add-architecture arm64
        printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse\n' \
          | sudo tee /etc/apt/sources.list.d/ports-arm64.list
        sudo apt-get update -qq
        sudo apt-get install -y \
          xorriso mtools dosfstools e2fsprogs squashfs-tools \
          curl xz-utils rsync openssl \
          qemu-user-static binfmt-support \
          grub-common grub-efi-arm64-bin grub-efi-arm64
        sudo update-binfmts --enable qemu-aarch64 2>/dev/null || true
        echo "Done: $(which grub-mkstandalone)"

    - name: Install xbps
      run: |
        set -euo pipefail
        curl -fsSL --retry 3 \
          "https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz" \
          -o /tmp/xbps.tar.xz
        mkdir -p /tmp/xbps-static
        tar xf /tmp/xbps.tar.xz -C /tmp/xbps-static
        for bin in xbps-install xbps-query xbps-reconfigure xbps-remove xbps-rindex; do
          FOUND=$(find /tmp/xbps-static -name "${bin}.static" | head -1)
          [ -n "$FOUND" ] && sudo install -m755 "$FOUND" /usr/local/bin/${bin}
        done
        xbps-install --version

    - name: Build rootfs
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        VOID_REPO="https://repo-default.voidlinux.org/current"

        mkdir -p "${ROOTFS}"/{dev,proc,sys,run,tmp,var/{log,cache/xbps},etc/xbps.d,boot}
        mkdir -p "${ROOTFS}"/etc/runit/{1,2,3,sv,runsvdir/default}
        mkdir -p "${ROOTFS}"/usr/{bin,lib,sbin,share}
        mkdir -p "${ROOTFS}"/home/void
        chmod 1777 "${ROOTFS}/tmp"

        XBPS_ARCH="aarch64" xbps-install \
          --repository="${VOID_REPO}" \
          --rootdir="${ROOTFS}" \
          --sync --yes \
          base-system runit-void linux linux-firmware \
          e2fsprogs dosfstools util-linux \
          wayland wayland-protocols xorg-server-xwayland \
          libdrm mesa mesa-dri \
          hyprland xdg-desktop-portal-hyprland xdg-desktop-portal xdg-user-dirs \
          hyprpaper hypridle \
          wl-clipboard wlr-randr grim slurp swappy \
          waybar otf-font-awesome wofi \
          foot foot-terminfo \
          noto-fonts-ttf noto-fonts-emoji ttf-ubuntu-font-family \
          dunst libnotify \
          pipewire pipewire-pulse wireplumber pavucontrol \
          NetworkManager networkmanager-applet iproute2 openssh \
          xbps bash bash-completion vim curl wget git htop \
          dbus polkit

        echo "voidarm64" > "${ROOTFS}/etc/hostname"
        echo "LANG=en_US.UTF-8" > "${ROOTFS}/etc/locale.conf"
        printf 'TIMEZONE="UTC"\nHARDWARECLOCK="UTC"\nKEYMAP="us"\nTTYS=2\n' \
          > "${ROOTFS}/etc/rc.conf"

        printf '#!/bin/sh\nPATH=/usr/bin:/usr/sbin:/bin:/sbin\nmountpoint -q /proc  || mount -t proc proc /proc\nmountpoint -q /sys   || mount -t sysfs sysfs /sys\nmountpoint -q /dev   || mount -t devtmpfs devtmpfs /dev\nmkdir -p /dev/{pts,shm}\nmountpoint -q /dev/pts || mount -t devpts devpts /dev/pts\nmountpoint -q /run   || mount -t tmpfs tmpfs /run\nmountpoint -q /tmp   || mount -t tmpfs tmpfs /tmp\nchmod 1777 /dev/shm\nmodprobe virtio_gpu 2>/dev/null || true\nmodprobe virtio_net 2>/dev/null || true\nmodprobe virtio_blk 2>/dev/null || true\nmodprobe virtio_rng 2>/dev/null || true\nhostname -F /etc/hostname\nmount -o remount,rw /\ncommand -v udevd >/dev/null 2>&1 && { udevd --daemon; udevadm trigger; udevadm settle; }\necho "voidarm64: stage 1 done"\n' \
          > "${ROOTFS}/etc/runit/1"
        chmod +x "${ROOTFS}/etc/runit/1"

        printf '#!/bin/sh\nexec env - PATH=/usr/bin:/usr/sbin:/bin:/sbin runsvdir -P /etc/runit/runsvdir/default "log: ..........."\n' \
          > "${ROOTFS}/etc/runit/2"
        chmod +x "${ROOTFS}/etc/runit/2"

        printf '#!/bin/sh\nsv force-stop /etc/runit/runsvdir/default 2>/dev/null || true\numount -a -r 2>/dev/null || true\n' \
          > "${ROOTFS}/etc/runit/3"
        chmod +x "${ROOTFS}/etc/runit/3"

        for svc in dbus NetworkManager sshd agetty-tty1 agetty-tty2; do
          [ -d "${ROOTFS}/etc/sv/${svc}" ] && \
            ln -sf "/etc/sv/${svc}" "${ROOTFS}/etc/runit/runsvdir/default/${svc}" || true
        done

        mkdir -p "${ROOTFS}/etc/sv/hyprland/log"
        printf '#!/bin/sh\nsv check dbus >/dev/null 2>&1 || sleep 2\nexport XDG_RUNTIME_DIR="/run/user/1000"\nexport XDG_SESSION_TYPE="wayland"\nexport XDG_CURRENT_DESKTOP="Hyprland"\nexport WLR_RENDERER="gles2"\nexport WLR_NO_HARDWARE_CURSORS="1"\nexport GBM_BACKEND="virpipe"\nexport __GLX_VENDOR_LIBRARY_NAME="mesa"\nexport DISPLAY=":0"\nmkdir -p "${XDG_RUNTIME_DIR}"\nchmod 0700 "${XDG_RUNTIME_DIR}"\nchown void:void "${XDG_RUNTIME_DIR}"\nexec chpst -u void:void:video:audio:input dbus-run-session -- Hyprland\n' \
          > "${ROOTFS}/etc/sv/hyprland/run"
        chmod +x "${ROOTFS}/etc/sv/hyprland/run"
        printf '#!/bin/sh\nexec svlogd -tt /var/log/hyprland\n' \
          > "${ROOTFS}/etc/sv/hyprland/log/run"
        chmod +x "${ROOTFS}/etc/sv/hyprland/log/run"
        ln -sf /etc/sv/hyprland "${ROOTFS}/etc/runit/runsvdir/default/hyprland"

        grep -q "^void:" "${ROOTFS}/etc/passwd" 2>/dev/null || \
          echo "void:x:1000:1000:void,,,:/home/void:/bin/bash" >> "${ROOTFS}/etc/passwd"
        grep -q "^void:" "${ROOTFS}/etc/group" 2>/dev/null || \
          echo "void:x:1000:" >> "${ROOTFS}/etc/group"
        for grp in wheel video audio input network plugdev; do
          grep -q "^${grp}:" "${ROOTFS}/etc/group" && \
            sed -i "/^${grp}:.*[^,]$/ s/$/,void/" "${ROOTFS}/etc/group" || true
        done
        HASHED=$(openssl passwd -6 "voidarm64")
        grep -q "^void:" "${ROOTFS}/etc/shadow" 2>/dev/null || \
          echo "void:${HASHED}:19000:0:99999:7:::" >> "${ROOTFS}/etc/shadow"
        sed -i "s|^root:[^:]*:|root:${HASHED}:|" "${ROOTFS}/etc/shadow" 2>/dev/null || true

        mkdir -p "${ROOTFS}/home/void/.config"/{hypr,waybar,wofi,foot,dunst}

        printf 'monitor = , preferred, auto, 1\nexec-once = pipewire\nexec-once = wireplumber\nexec-once = pipewire-pulse\nexec-once = dunst\nexec-once = waybar\nexec-once = nm-applet --indicator\ninput {\n  kb_layout = us\n  follow_mouse = 1\n  sensitivity = 0\n}\ngeneral {\n  gaps_in = 4\n  gaps_out = 8\n  border_size = 2\n  col.active_border = rgba(88c0d0ff) rgba(81a1c1ff) 45deg\n  col.inactive_border = rgba(2e3440ff)\n  layout = dwindle\n}\ndecoration {\n  rounding = 6\n  blur { enabled = false }\n  drop_shadow = false\n}\nanimations {\n  enabled = true\n  bezier = easeOut, 0.05, 0.9, 0.1, 1.0\n  animation = windows, 1, 4, easeOut\n  animation = fade, 1, 4, default\n  animation = workspaces, 1, 4, default\n}\ndwindle { pseudotile = true; preserve_split = true }\nmisc { force_default_wallpaper = 0; disable_hyprland_logo = true }\n$mod = SUPER\nbind = $mod, Return, exec, foot\nbind = $mod, D, exec, wofi --show drun\nbind = $mod SHIFT, Q, killactive\nbind = $mod SHIFT, E, exit\nbind = $mod, F, fullscreen\nbind = $mod SHIFT, space, togglefloating\nbind = $mod, h, movefocus, l\nbind = $mod, l, movefocus, r\nbind = $mod, k, movefocus, u\nbind = $mod, j, movefocus, d\nbind = $mod, 1, workspace, 1\nbind = $mod, 2, workspace, 2\nbind = $mod, 3, workspace, 3\nbind = $mod, 4, workspace, 4\nbind = $mod, 5, workspace, 5\nbind = $mod SHIFT, 1, movetoworkspace, 1\nbind = $mod SHIFT, 2, movetoworkspace, 2\nbind = $mod SHIFT, 3, movetoworkspace, 3\nbind = $mod SHIFT, 4, movetoworkspace, 4\nbind = $mod SHIFT, 5, movetoworkspace, 5\nbindm = $mod, mouse:272, movewindow\nbindm = $mod, mouse:273, resizewindow\nbind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%%+\nbind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%%-\nbind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle\n' \
          > "${ROOTFS}/home/void/.config/hypr/hyprland.conf"

        printf '{"layer":"top","position":"top","height":28,"spacing":4,"modules-left":["hyprland/workspaces","hyprland/window"],"modules-center":["clock"],"modules-right":["pulseaudio","network","cpu","memory","tray"],"hyprland/workspaces":{"format":"{id}","on-click":"activate"},"hyprland/window":{"max-length":60},"clock":{"format":"{:%%a %%d %%b  %%H:%%M}"},"cpu":{"format":" {usage}%%","interval":3},"memory":{"format":" {used:0.1f}G","interval":5},"pulseaudio":{"format":"{icon} {volume}%%","format-muted":"muted","on-click":"pavucontrol"},"network":{"format-wifi":" {essid}","format-ethernet":" {ipaddr}","format-disconnected":"offline"},"tray":{"spacing":8}}\n' \
          > "${ROOTFS}/home/void/.config/waybar/config"

        printf '* { font-family: monospace; font-size: 12px; border: none; min-height: 0; }\nwindow#waybar { background: rgba(46,52,64,0.95); color: #eceff4; }\n#workspaces button { padding: 0 6px; color: #81a1c1; background: transparent; }\n#workspaces button.active { color: #88c0d0; border-bottom: 2px solid #88c0d0; }\n#clock { color: #88c0d0; padding: 0 10px; }\n#cpu { color: #a3be8c; padding: 0 10px; }\n#memory { color: #ebcb8b; padding: 0 10px; }\n#pulseaudio { color: #b48ead; padding: 0 10px; }\n#network { color: #81a1c1; padding: 0 10px; }\n' \
          > "${ROOTFS}/home/void/.config/waybar/style.css"

        printf 'width=400\nheight=300\nlocation=center\nshow=drun\nprompt=Search...\ngtk_dark=true\nallow_images=true\n' \
          > "${ROOTFS}/home/void/.config/wofi/config"

        printf 'window { background-color: #2e3440; border: 1px solid #4c566a; border-radius: 8px; }\n#input { background-color: #3b4252; color: #eceff4; border: none; border-radius: 4px; margin: 8px; padding: 6px 10px; }\n#entry:selected { background-color: #4c566a; color: #88c0d0; }\n#text { color: #d8dee9; }\n' \
          > "${ROOTFS}/home/void/.config/wofi/style.css"

        printf '[main]\nfont=monospace:size=11\ndpi-aware=yes\n[colors]\nbackground=2e3440\nforeground=d8dee9\nregular0=3b4252\nregular1=bf616a\nregular2=a3be8c\nregular3=ebcb8b\nregular4=81a1c1\nregular5=b48ead\nregular6=88c0d0\nregular7=e5e9f0\n' \
          > "${ROOTFS}/home/void/.config/foot/foot.ini"

        printf '[global]\norigin = top-right\noffset = 12x12\nwidth = 320\nfont = Sans 11\ncorner_radius = 6\nbackground = "#2e3440"\nforeground = "#d8dee9"\ntimeout = 5\n' \
          > "${ROOTFS}/home/void/.config/dunst/dunstrc"

        printf 'if [ -z "$WAYLAND_DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then\n  export XDG_RUNTIME_DIR="/run/user/$(id -u)"\n  export XDG_SESSION_TYPE="wayland"\n  export XDG_CURRENT_DESKTOP="Hyprland"\n  export WLR_RENDERER="gles2"\n  export WLR_NO_HARDWARE_CURSORS="1"\n  export GBM_BACKEND="virpipe"\n  export __GLX_VENDOR_LIBRARY_NAME="mesa"\n  mkdir -p "$XDG_RUNTIME_DIR"\n  chmod 700 "$XDG_RUNTIME_DIR"\n  exec dbus-run-session -- Hyprland\nfi\n' \
          > "${ROOTFS}/home/void/.bash_profile"

        printf 'export PS1="\\[\\033[01;32m\\]\\u@voidarm64\\[\\033[00m\\]:\\[\\033[01;34m\\]\\w\\[\\033[00m\\]\\$ "\nexport EDITOR=vim\nalias ls="ls --color=auto"\nalias ll="ls -lah"\n' \
          > "${ROOTFS}/home/void/.bashrc"

        printf '\n  voidarm64 + Hyprland\n  login: void / voidarm64\n  Hyprland starts automatically on tty1\n\n' \
          > "${ROOTFS}/etc/motd"

        chown -R 1000:1000 "${ROOTFS}/home/void"
        chmod 700 "${ROOTFS}/home/void"

        XBPS_ARCH="aarch64" xbps-reconfigure \
          --rootdir="${ROOTFS}" --force --all 2>/dev/null || true

        echo "Rootfs size: $(du -sh ${ROOTFS} | cut -f1)"
      timeout-minutes: 45

    - name: Build ISO
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        ISO_WORK="/tmp/voidarm64-iso"
        ISO_LABEL="VOIDARM64"
        mkdir -p "${ISO_WORK}"/{boot/grub,efi/boot,live}
        mkdir -p output

        echo "Compressing rootfs to squashfs..."
        mksquashfs "${ROOTFS}" "${ISO_WORK}/live/filesystem.squashfs" \
          -comp zstd -Xcompression-level 6 -b 1M -noappend \
          -e "${ROOTFS}/proc" -e "${ROOTFS}/sys" \
          -e "${ROOTFS}/dev" -e "${ROOTFS}/run" -e "${ROOTFS}/tmp"
        echo "SquashFS: $(du -sh ${ISO_WORK}/live/filesystem.squashfs | cut -f1)"

        KERNEL=$(ls "${ROOTFS}/boot/vmlinuz-"* 2>/dev/null | sort -V | tail -1)
        INITRD=$(ls "${ROOTFS}/boot/initramfs-"* 2>/dev/null | sort -V | tail -1)
        [ -n "$KERNEL" ] || { echo "ERROR: no kernel found"; exit 1; }
        [ -n "$INITRD" ] || { echo "ERROR: no initramfs found"; exit 1; }
        cp "${KERNEL}" "${ISO_WORK}/boot/vmlinuz"
        cp "${INITRD}" "${ISO_WORK}/boot/initramfs"
        echo "Kernel: $(basename $KERNEL)"

        printf 'set default=0\nset timeout=5\nmenuentry "voidarm64 + Hyprland" {\n  linux /boot/vmlinuz root=live:CDLABEL=%s rd.live.image rd.live.overlay.overlayfs=1 console=ttyAMA0 console=tty0 loglevel=4 quiet\n  initrd /boot/initramfs\n}\n' \
          "${ISO_LABEL}" > "${ISO_WORK}/boot/grub/grub.cfg"

        grub-mkstandalone \
          --format=arm64-efi \
          --output="${ISO_WORK}/efi/boot/bootaa64.efi" \
          "boot/grub/grub.cfg=${ISO_WORK}/boot/grub/grub.cfg"

        EFI_IMG="${ISO_WORK}/boot/efi.img"
        dd if=/dev/zero of="${EFI_IMG}" bs=1K count=4096 2>/dev/null
        mkfs.fat -F12 "${EFI_IMG}"
        mmd   -i "${EFI_IMG}" ::/EFI ::/EFI/BOOT
        mcopy -i "${EFI_IMG}" "${ISO_WORK}/efi/boot/bootaa64.efi" ::/EFI/BOOT/

        echo "Building ISO..."
        xorriso -as mkisofs \
          -iso-level 3 \
          -volid "${ISO_LABEL}" \
          -full-iso9660-filenames \
          -rational-rock \
          -joliet \
          -e boot/efi.img \
          -no-emul-boot \
          -append_partition 2 0xef "${ISO_WORK}/boot/efi.img" \
          -output "output/voidarm64-hyprland.iso" \
          "${ISO_WORK}" 2>&1 | tail -5

        echo "ISO: $(du -sh output/voidarm64-hyprland.iso | cut -f1)"
      timeout-minutes: 20

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: voidarm64-hyprland
        path: output/voidarm64-hyprland.iso
        retention-days: 7

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: voidarm64 Hyprland - Build ${{ github.run_number }}
        body: |
          Bootable ISO for UTM on Apple Silicon.
          Login: void / voidarm64
          UTM display setting: virtio-gpu-gl-pci
        files: output/voidarm64-hyprland.iso
        draft: false
        prerelease: falsename: Build voidarm64 ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build voidarm64 + Hyprland ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Install dependencies
      run: |
        # Remove third-party source files that break with multi-arch
        # (microsoft-prod, azure-cli, github-cli use non-standard formats)
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list
        sudo rm -f /etc/apt/sources.list.d/github-cli.list
        sudo rm -f /etc/apt/sources.list.d/mono-official*.list
        # Remove any .sources (deb822 format) files that may conflict
        sudo rm -f /etc/apt/sources.list.d/*.sources

        # Pin existing repos to amd64 only
        sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
        for f in /etc/apt/sources.list.d/*.list; do
          [ -f "$f" ] && sudo sed -i 's/^deb /deb [arch=amd64] /g' "$f" || true
        done

        # Add Ubuntu ports repo for arm64 packages only
        sudo dpkg --add-architecture arm64
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" \
          | sudo tee /etc/apt/sources.list.d/ports-arm64.list
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" \
          | sudo tee -a /etc/apt/sources.list.d/ports-arm64.list

        export DEBIAN_FRONTEND=noninteractive
        # Remove ALL dpkg post-invoke hooks that fail on GitHub Actions
        # (PackageKit and needrestart both try to use dbus/systemd which aren't running)
        sudo apt-get remove -y --purge needrestart libpython3-dev 2>/dev/null || true
        sudo rm -f /etc/apt/apt.conf.d/20packagekit
        sudo rm -f /usr/share/dbus-1/system-services/org.freedesktop.PackageKit.service
        # Nuke every post-invoke snippet
        sudo rm -f /etc/apt/apt.conf.d/*needrestart*
        sudo rm -f /etc/apt/apt.conf.d/*packagekit*
        sudo rm -f /usr/lib/needrestart/apt-pinvoke
        # Write an apt config that clears ALL Post-Invoke hooks
        printf 'DPkg::Post-Invoke { "true"; };\nAPT::Update::Post-Invoke { "true"; };\n' \
          | sudo tee /etc/apt/apt.conf.d/00no-hooks

        sudo apt-get update -qq
        sudo apt-get install -y \
          xorriso \
          mtools dosfstools e2fsprogs squashfs-tools \
          curl xz-utils rsync openssl \
          qemu-user-static binfmt-support \
          grub-common \
          grub-efi-arm64-bin \
          grub-efi-arm64
        sudo update-binfmts --enable qemu-aarch64 2>/dev/null || true
        echo "grub-mkstandalone: $(which grub-mkstandalone)"

    - name: Install xbps
      run: |
        set -euo pipefail
        curl -fsSL --retry 3 \
          "https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz" \
          -o /tmp/xbps.tar.xz
        mkdir -p /tmp/xbps-static
        tar xf /tmp/xbps.tar.xz -C /tmp/xbps-static
        for bin in xbps-install xbps-query xbps-reconfigure xbps-remove xbps-rindex; do
          FOUND=$(find /tmp/xbps-static -name "${bin}.static" | head -1)
          [ -n "$FOUND" ] && sudo install -m755 "$FOUND" /usr/local/bin/${bin}
        done
        xbps-install --version

    - name: Build rootfs
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        VOID_REPO="https://repo-default.voidlinux.org/current"

        # ── Directory structure ───────────────────────────────────────────────
        mkdir -p "${ROOTFS}"/{dev,proc,sys,run,tmp,var/{log,cache/xbps},etc/xbps.d,boot}
        mkdir -p "${ROOTFS}"/etc/runit/{1,2,3,sv,runsvdir/default}
        mkdir -p "${ROOTFS}"/usr/{bin,lib,sbin,share}
        mkdir -p "${ROOTFS}"/home/void
        chmod 1777 "${ROOTFS}/tmp"

        # ── Install packages ──────────────────────────────────────────────────
        XBPS_ARCH="aarch64" xbps-install \
          --repository="${VOID_REPO}" \
          --rootdir="${ROOTFS}" \
          --sync --yes \
          base-system runit-void linux linux-firmware \
          e2fsprogs dosfstools util-linux \
          wayland wayland-protocols xorg-server-xwayland \
          libdrm mesa mesa-dri \
          hyprland xdg-desktop-portal-hyprland xdg-desktop-portal xdg-user-dirs \
          hyprpaper hypridle \
          wl-clipboard wlr-randr grim slurp swappy \
          waybar otf-font-awesome \
          wofi \
          foot foot-terminfo \
          noto-fonts-ttf noto-fonts-emoji ttf-ubuntu-font-family \
          dunst libnotify \
          pipewire pipewire-pulse wireplumber pavucontrol \
          NetworkManager networkmanager-applet iproute2 openssh \
          xbps bash bash-completion vim curl wget git htop \
          dbus polkit

        # ── System config ─────────────────────────────────────────────────────
        echo "voidarm64" > "${ROOTFS}/etc/hostname"
        echo "LANG=en_US.UTF-8" > "${ROOTFS}/etc/locale.conf"
        cat > "${ROOTFS}/etc/rc.conf" <<'EOF'
        TIMEZONE="UTC"
        HARDWARECLOCK="UTC"
        KEYMAP="us"
        TTYS=2
        EOF

        # ── runit stage 1 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/1" <<'EOF'
        #!/bin/sh
        PATH=/usr/bin:/usr/sbin:/bin:/sbin
        mountpoint -q /proc  || mount -t proc     proc     /proc
        mountpoint -q /sys   || mount -t sysfs    sysfs    /sys
        mountpoint -q /dev   || mount -t devtmpfs devtmpfs /dev
        mkdir -p /dev/{pts,shm}
        mountpoint -q /dev/pts || mount -t devpts devpts /dev/pts
        mountpoint -q /run   || mount -t tmpfs tmpfs /run
        mountpoint -q /tmp   || mount -t tmpfs tmpfs /tmp
        chmod 1777 /dev/shm
        modprobe virtio_gpu 2>/dev/null || true
        modprobe virtio_net 2>/dev/null || true
        modprobe virtio_blk 2>/dev/null || true
        modprobe virtio_rng 2>/dev/null || true
        hostname -F /etc/hostname
        mount -o remount,rw /
        command -v udevd >/dev/null 2>&1 && {
          udevd --daemon; udevadm trigger; udevadm settle
        }
        echo "voidarm64: stage 1 done"
        EOF
        chmod +x "${ROOTFS}/etc/runit/1"

        # ── runit stage 2 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/2" <<'EOF'
        #!/bin/sh
        exec env - PATH=/usr/bin:/usr/sbin:/bin:/sbin \
          runsvdir -P /etc/runit/runsvdir/default 'log: ...........'
        EOF
        chmod +x "${ROOTFS}/etc/runit/2"

        # ── runit stage 3 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/3" <<'EOF'
        #!/bin/sh
        sv force-stop /etc/runit/runsvdir/default 2>/dev/null || true
        umount -a -r 2>/dev/null || true
        EOF
        chmod +x "${ROOTFS}/etc/runit/3"

        # ── Enable services ───────────────────────────────────────────────────
        for svc in dbus NetworkManager sshd agetty-tty1 agetty-tty2; do
          [ -d "${ROOTFS}/etc/sv/${svc}" ] && \
            ln -sf "/etc/sv/${svc}" "${ROOTFS}/etc/runit/runsvdir/default/${svc}"
        done

        # ── Hyprland service ──────────────────────────────────────────────────
        mkdir -p "${ROOTFS}/etc/sv/hyprland/log"
        cat > "${ROOTFS}/etc/sv/hyprland/run" <<'EOF'
        #!/bin/sh
        sv check dbus >/dev/null 2>&1 || sleep 2
        export XDG_RUNTIME_DIR="/run/user/1000"
        export XDG_SESSION_TYPE="wayland"
        export XDG_CURRENT_DESKTOP="Hyprland"
        export WLR_RENDERER="gles2"
        export WLR_NO_HARDWARE_CURSORS="1"
        export GBM_BACKEND="virpipe"
        export __GLX_VENDOR_LIBRARY_NAME="mesa"
        export DISPLAY=":0"
        mkdir -p "${XDG_RUNTIME_DIR}"
        chmod 0700 "${XDG_RUNTIME_DIR}"
        chown void:void "${XDG_RUNTIME_DIR}"
        exec chpst -u void:void:video:audio:input dbus-run-session -- Hyprland
        EOF
        chmod +x "${ROOTFS}/etc/sv/hyprland/run"
        cat > "${ROOTFS}/etc/sv/hyprland/log/run" <<'EOF'
        #!/bin/sh
        exec svlogd -tt /var/log/hyprland
        EOF
        chmod +x "${ROOTFS}/etc/sv/hyprland/log/run"
        ln -sf /etc/sv/hyprland "${ROOTFS}/etc/runit/runsvdir/default/hyprland"

        # ── User account ──────────────────────────────────────────────────────
        grep -q "^void:" "${ROOTFS}/etc/passwd" 2>/dev/null || \
          echo "void:x:1000:1000:void,,,:/home/void:/bin/bash" >> "${ROOTFS}/etc/passwd"
        grep -q "^void:" "${ROOTFS}/etc/group" 2>/dev/null || \
          echo "void:x:1000:" >> "${ROOTFS}/etc/group"
        for grp in wheel video audio input network plugdev; do
          grep -q "^${grp}:" "${ROOTFS}/etc/group" && \
            sed -i "/^${grp}:.*/ s/$/,void/" "${ROOTFS}/etc/group" || true
        done
        HASHED=$(openssl passwd -6 "voidarm64")
        grep -q "^void:" "${ROOTFS}/etc/shadow" 2>/dev/null || \
          echo "void:${HASHED}:19000:0:99999:7:::" >> "${ROOTFS}/etc/shadow"
        sed -i "s|^root:[^:]*:|root:${HASHED}:|" "${ROOTFS}/etc/shadow" 2>/dev/null || true

        # ── Desktop configs ───────────────────────────────────────────────────
        mkdir -p "${ROOTFS}/home/void/.config"/{hypr,waybar,wofi,foot,dunst}

        # Hyprland
        cat > "${ROOTFS}/home/void/.config/hypr/hyprland.conf" <<'EOF'
        monitor = , preferred, auto, 1
        exec-once = pipewire
        exec-once = wireplumber
        exec-once = pipewire-pulse
        exec-once = dunst
        exec-once = waybar
        exec-once = nm-applet --indicator
        input {
          kb_layout = us
          follow_mouse = 1
          sensitivity = 0
          touchpad { natural_scroll = true }
        }
        general {
          gaps_in = 4
          gaps_out = 8
          border_size = 2
          col.active_border = rgba(88c0d0ff) rgba(81a1c1ff) 45deg
          col.inactive_border = rgba(2e3440ff)
          layout = dwindle
        }
        decoration {
          rounding = 6
          blur { enabled = false }
          drop_shadow = false
        }
        animations {
          enabled = true
          bezier = easeOut, 0.05, 0.9, 0.1, 1.0
          animation = windows, 1, 4, easeOut
          animation = fade, 1, 4, default
          animation = workspaces, 1, 4, default
        }
        dwindle { pseudotile = true; preserve_split = true }
        misc { force_default_wallpaper = 0; disable_hyprland_logo = true }
        $mod = SUPER
        bind = $mod, Return, exec, foot
        bind = $mod, D, exec, wofi --show drun
        bind = $mod SHIFT, Q, killactive
        bind = $mod SHIFT, E, exit
        bind = $mod, F, fullscreen
        bind = $mod SHIFT, space, togglefloating
        bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
        bind = $mod, h, movefocus, l
        bind = $mod, l, movefocus, r
        bind = $mod, k, movefocus, u
        bind = $mod, j, movefocus, d
        bind = $mod, 1, workspace, 1
        bind = $mod, 2, workspace, 2
        bind = $mod, 3, workspace, 3
        bind = $mod, 4, workspace, 4
        bind = $mod, 5, workspace, 5
        bind = $mod SHIFT, 1, movetoworkspace, 1
        bind = $mod SHIFT, 2, movetoworkspace, 2
        bind = $mod SHIFT, 3, movetoworkspace, 3
        bind = $mod SHIFT, 4, movetoworkspace, 4
        bind = $mod SHIFT, 5, movetoworkspace, 5
        bindm = $mod, mouse:272, movewindow
        bindm = $mod, mouse:273, resizewindow
        bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
        bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
        bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
        EOF

        # Waybar
        cat > "${ROOTFS}/home/void/.config/waybar/config" <<'EOF'
        {"layer":"top","position":"top","height":28,"spacing":4,
        "modules-left":["hyprland/workspaces","hyprland/window"],
        "modules-center":["clock"],"modules-right":["pulseaudio","network","cpu","memory","tray"],
        "hyprland/workspaces":{"format":"{id}","on-click":"activate"},
        "hyprland/window":{"max-length":60},
        "clock":{"format":"{:%a %d %b  %H:%M}"},
        "cpu":{"format":" {usage}%","interval":3},
        "memory":{"format":" {used:0.1f}G","interval":5},
        "pulseaudio":{"format":"{icon} {volume}%","format-muted":"󰝟","format-icons":{"default":["",""," "]},"on-click":"pavucontrol"},
        "network":{"format-wifi":" {essid}","format-ethernet":" {ipaddr}","format-disconnected":"⚠ offline"},
        "tray":{"spacing":8}}
        EOF
        cat > "${ROOTFS}/home/void/.config/waybar/style.css" <<'EOF'
        * { font-family: "Ubuntu", monospace; font-size: 12px; border: none; min-height: 0; }
        window#waybar { background: rgba(46,52,64,0.95); color: #eceff4; }
        #workspaces button { padding: 0 6px; color: #81a1c1; background: transparent; }
        #workspaces button.active { color: #88c0d0; border-bottom: 2px solid #88c0d0; }
        #clock { color: #88c0d0; padding: 0 10px; }
        #cpu { color: #a3be8c; padding: 0 10px; }
        #memory { color: #ebcb8b; padding: 0 10px; }
        #pulseaudio { color: #b48ead; padding: 0 10px; }
        #network { color: #81a1c1; padding: 0 10px; }
        EOF

        # Wofi
        printf 'width=400\nheight=300\nlocation=center\nshow=drun\nprompt=Search...\ngtk_dark=true\nallow_images=true\n' \
          > "${ROOTFS}/home/void/.config/wofi/config"
        cat > "${ROOTFS}/home/void/.config/wofi/style.css" <<'EOF'
        window { background-color: #2e3440; border: 1px solid #4c566a; border-radius: 8px; }
        #input { background-color: #3b4252; color: #eceff4; border: none; border-radius: 4px; margin: 8px; padding: 6px 10px; }
        #entry:selected { background-color: #4c566a; color: #88c0d0; }
        #text { color: #d8dee9; }
        EOF

        # Foot terminal
        cat > "${ROOTFS}/home/void/.config/foot/foot.ini" <<'EOF'
        [main]
        font=monospace:size=11
        dpi-aware=yes
        [colors]
        background=2e3440
        foreground=d8dee9
        regular0=3b4252
        regular1=bf616a
        regular2=a3be8c
        regular3=ebcb8b
        regular4=81a1c1
        regular5=b48ead
        regular6=88c0d0
        regular7=e5e9f0
        EOF

        # Dunst
        cat > "${ROOTFS}/home/void/.config/dunst/dunstrc" <<'EOF'
        [global]
        origin = top-right
        offset = 12x12
        width = 320
        font = Ubuntu 11
        corner_radius = 6
        background = "#2e3440"
        foreground = "#d8dee9"
        timeout = 5
        EOF

        # .bash_profile — auto-launch Hyprland on tty1
        cat > "${ROOTFS}/home/void/.bash_profile" <<'EOF'
        if [ -z "$WAYLAND_DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export XDG_SESSION_TYPE="wayland"
          export XDG_CURRENT_DESKTOP="Hyprland"
          export WLR_RENDERER="gles2"
          export WLR_NO_HARDWARE_CURSORS="1"
          export GBM_BACKEND="virpipe"
          export __GLX_VENDOR_LIBRARY_NAME="mesa"
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          exec dbus-run-session -- Hyprland
        fi
        EOF

        cat > "${ROOTFS}/home/void/.bashrc" <<'EOF'
        export PS1='\[\033[01;32m\]\u@voidarm64\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '
        export EDITOR=vim
        alias ls='ls --color=auto'
        alias ll='ls -lah'
        EOF

        cat > "${ROOTFS}/etc/motd" <<'EOF'

          voidarm64 + Hyprland
          login: void / voidarm64
          Hyprland starts automatically on tty1

        EOF

        chown -R 1000:1000 "${ROOTFS}/home/void"
        chmod 700 "${ROOTFS}/home/void"

        XBPS_ARCH="aarch64" xbps-reconfigure \
          --rootdir="${ROOTFS}" --force --all 2>/dev/null || true

        echo "Rootfs size: $(du -sh ${ROOTFS} | cut -f1)"
      timeout-minutes: 45

    - name: Build ISO
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        ISO_WORK="/tmp/voidarm64-iso"
        ISO_LABEL="VOIDARM64"
        mkdir -p "${ISO_WORK}"/{boot/grub,efi/boot,live}
        mkdir -p output

        # Compress rootfs
        echo "Compressing rootfs..."
        mksquashfs "${ROOTFS}" "${ISO_WORK}/live/filesystem.squashfs" \
          -comp zstd -Xcompression-level 6 -b 1M -noappend \
          -e "${ROOTFS}/proc" -e "${ROOTFS}/sys" \
          -e "${ROOTFS}/dev" -e "${ROOTFS}/run" -e "${ROOTFS}/tmp"
        echo "SquashFS: $(du -sh ${ISO_WORK}/live/filesystem.squashfs | cut -f1)"

        # Copy kernel + initramfs
        KERNEL=$(ls "${ROOTFS}/boot/vmlinuz-"* 2>/dev/null | sort -V | tail -1)
        INITRD=$(ls "${ROOTFS}/boot/initramfs-"* 2>/dev/null | sort -V | tail -1)
        [ -n "$KERNEL" ] || { echo "ERROR: no kernel found"; exit 1; }
        [ -n "$INITRD" ] || { echo "ERROR: no initramfs found"; exit 1; }
        cp "${KERNEL}" "${ISO_WORK}/boot/vmlinuz"
        cp "${INITRD}" "${ISO_WORK}/boot/initramfs"
        echo "Kernel: $(basename $KERNEL)"

        # GRUB config
        cat > "${ISO_WORK}/boot/grub/grub.cfg" <<GRUBEOF
        set default=0
        set timeout=5
        menuentry "voidarm64 + Hyprland" {
          linux  /boot/vmlinuz root=live:CDLABEL=${ISO_LABEL} rd.live.image rd.live.overlay.overlayfs=1 console=ttyAMA0 console=tty0 loglevel=4 quiet
          initrd /boot/initramfs
        }
        GRUBEOF

        # GRUB EFI binary
        grub-mkstandalone \
          --format=arm64-efi \
          --output="${ISO_WORK}/efi/boot/bootaa64.efi" \
          "boot/grub/grub.cfg=${ISO_WORK}/boot/grub/grub.cfg"

        # EFI FAT image
        EFI_IMG="${ISO_WORK}/boot/efi.img"
        dd if=/dev/zero of="${EFI_IMG}" bs=1K count=4096 2>/dev/null
        mkfs.fat -F12 "${EFI_IMG}"
        mmd   -i "${EFI_IMG}" ::/EFI ::/EFI/BOOT
        mcopy -i "${EFI_IMG}" "${ISO_WORK}/efi/boot/bootaa64.efi" ::/EFI/BOOT/

        # Build ISO
        echo "Building ISO..."
        xorriso -as mkisofs \
          -iso-level 3 \
          -volid "${ISO_LABEL}" \
          -full-iso9660-filenames \
          -rational-rock \
          -joliet \
          -e boot/efi.img \
          -no-emul-boot \
          -append_partition 2 0xef "${ISO_WORK}/boot/efi.img" \
          -output "output/voidarm64-hyprland.iso" \
          "${ISO_WORK}" 2>&1 | tail -5

        echo "ISO: $(du -sh output/voidarm64-hyprland.iso | cut -f1)"
      timeout-minutes: 20

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: voidarm64-hyprland
        path: output/voidarm64-hyprland.iso
        retention-days: 7

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: voidarm64 Hyprland — Build ${{ github.run_number }}
        body: |
          ## voidarm64 + Hyprland
          Bootable ISO for UTM on Apple Silicon (M1/M2/M3).
          **Login:** `void` / `voidarm64`
          **UTM display setting:** `virtio-gpu-gl-pci`
        files: output/voidarm64-hyprland.iso
        draft: false
        prerelease: falsename: Build voidarm64 ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build voidarm64 + Hyprland ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Install dependencies
      run: |
        # Remove third-party source files that break with multi-arch
        # (microsoft-prod, azure-cli, github-cli use non-standard formats)
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list
        sudo rm -f /etc/apt/sources.list.d/github-cli.list
        sudo rm -f /etc/apt/sources.list.d/mono-official*.list
        # Remove any .sources (deb822 format) files that may conflict
        sudo rm -f /etc/apt/sources.list.d/*.sources

        # Pin existing repos to amd64 only
        sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
        for f in /etc/apt/sources.list.d/*.list; do
          [ -f "$f" ] && sudo sed -i 's/^deb /deb [arch=amd64] /g' "$f" || true
        done

        # Add Ubuntu ports repo for arm64 packages only
        sudo dpkg --add-architecture arm64
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" \
          | sudo tee /etc/apt/sources.list.d/ports-arm64.list
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" \
          | sudo tee -a /etc/apt/sources.list.d/ports-arm64.list

        export DEBIAN_FRONTEND=noninteractive
        # Remove ALL dpkg post-invoke hooks that fail on GitHub Actions
        # (PackageKit and needrestart both try to use dbus/systemd which aren't running)
        sudo apt-get remove -y --purge needrestart libpython3-dev 2>/dev/null || true
        sudo rm -f /etc/apt/apt.conf.d/20packagekit
        sudo rm -f /usr/share/dbus-1/system-services/org.freedesktop.PackageKit.service
        # Nuke every post-invoke snippet
        sudo rm -f /etc/apt/apt.conf.d/*needrestart*
        sudo rm -f /etc/apt/apt.conf.d/*packagekit*
        sudo rm -f /usr/lib/needrestart/apt-pinvoke
        # Write an apt config that clears ALL Post-Invoke hooks
        cat << 'APTCONF' | sudo tee /etc/apt/apt.conf.d/00no-hooks
DPkg::Post-Invoke { "true"; };
APT::Update::Post-Invoke { "true"; };
APTCONF

        sudo apt-get update -qq
        sudo apt-get install -y \
          xorriso \
          mtools dosfstools e2fsprogs squashfs-tools \
          curl xz-utils rsync openssl \
          qemu-user-static binfmt-support \
          grub-common \
          grub-efi-arm64-bin \
          grub-efi-arm64
        sudo update-binfmts --enable qemu-aarch64 2>/dev/null || true
        echo "grub-mkstandalone: $(which grub-mkstandalone)"

    - name: Install xbps
      run: |
        set -euo pipefail
        curl -fsSL --retry 3 \
          "https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz" \
          -o /tmp/xbps.tar.xz
        mkdir -p /tmp/xbps-static
        tar xf /tmp/xbps.tar.xz -C /tmp/xbps-static
        for bin in xbps-install xbps-query xbps-reconfigure xbps-remove xbps-rindex; do
          FOUND=$(find /tmp/xbps-static -name "${bin}.static" | head -1)
          [ -n "$FOUND" ] && sudo install -m755 "$FOUND" /usr/local/bin/${bin}
        done
        xbps-install --version

    - name: Build rootfs
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        VOID_REPO="https://repo-default.voidlinux.org/current"

        # ── Directory structure ───────────────────────────────────────────────
        mkdir -p "${ROOTFS}"/{dev,proc,sys,run,tmp,var/{log,cache/xbps},etc/xbps.d,boot}
        mkdir -p "${ROOTFS}"/etc/runit/{1,2,3,sv,runsvdir/default}
        mkdir -p "${ROOTFS}"/usr/{bin,lib,sbin,share}
        mkdir -p "${ROOTFS}"/home/void
        chmod 1777 "${ROOTFS}/tmp"

        # ── Install packages ──────────────────────────────────────────────────
        XBPS_ARCH="aarch64" xbps-install \
          --repository="${VOID_REPO}" \
          --rootdir="${ROOTFS}" \
          --sync --yes \
          base-system runit-void linux linux-firmware \
          e2fsprogs dosfstools util-linux \
          wayland wayland-protocols xorg-server-xwayland \
          libdrm mesa mesa-dri \
          hyprland xdg-desktop-portal-hyprland xdg-desktop-portal xdg-user-dirs \
          hyprpaper hypridle \
          wl-clipboard wlr-randr grim slurp swappy \
          waybar otf-font-awesome \
          wofi \
          foot foot-terminfo \
          noto-fonts-ttf noto-fonts-emoji ttf-ubuntu-font-family \
          dunst libnotify \
          pipewire pipewire-pulse wireplumber pavucontrol \
          NetworkManager networkmanager-applet iproute2 openssh \
          xbps bash bash-completion vim curl wget git htop \
          dbus polkit

        # ── System config ─────────────────────────────────────────────────────
        echo "voidarm64" > "${ROOTFS}/etc/hostname"
        echo "LANG=en_US.UTF-8" > "${ROOTFS}/etc/locale.conf"
        cat > "${ROOTFS}/etc/rc.conf" <<'EOF'
        TIMEZONE="UTC"
        HARDWARECLOCK="UTC"
        KEYMAP="us"
        TTYS=2
        EOF

        # ── runit stage 1 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/1" <<'EOF'
        #!/bin/sh
        PATH=/usr/bin:/usr/sbin:/bin:/sbin
        mountpoint -q /proc  || mount -t proc     proc     /proc
        mountpoint -q /sys   || mount -t sysfs    sysfs    /sys
        mountpoint -q /dev   || mount -t devtmpfs devtmpfs /dev
        mkdir -p /dev/{pts,shm}
        mountpoint -q /dev/pts || mount -t devpts devpts /dev/pts
        mountpoint -q /run   || mount -t tmpfs tmpfs /run
        mountpoint -q /tmp   || mount -t tmpfs tmpfs /tmp
        chmod 1777 /dev/shm
        modprobe virtio_gpu 2>/dev/null || true
        modprobe virtio_net 2>/dev/null || true
        modprobe virtio_blk 2>/dev/null || true
        modprobe virtio_rng 2>/dev/null || true
        hostname -F /etc/hostname
        mount -o remount,rw /
        command -v udevd >/dev/null 2>&1 && {
          udevd --daemon; udevadm trigger; udevadm settle
        }
        echo "voidarm64: stage 1 done"
        EOF
        chmod +x "${ROOTFS}/etc/runit/1"

        # ── runit stage 2 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/2" <<'EOF'
        #!/bin/sh
        exec env - PATH=/usr/bin:/usr/sbin:/bin:/sbin \
          runsvdir -P /etc/runit/runsvdir/default 'log: ...........'
        EOF
        chmod +x "${ROOTFS}/etc/runit/2"

        # ── runit stage 3 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/3" <<'EOF'
        #!/bin/sh
        sv force-stop /etc/runit/runsvdir/default 2>/dev/null || true
        umount -a -r 2>/dev/null || true
        EOF
        chmod +x "${ROOTFS}/etc/runit/3"

        # ── Enable services ───────────────────────────────────────────────────
        for svc in dbus NetworkManager sshd agetty-tty1 agetty-tty2; do
          [ -d "${ROOTFS}/etc/sv/${svc}" ] && \
            ln -sf "/etc/sv/${svc}" "${ROOTFS}/etc/runit/runsvdir/default/${svc}"
        done

        # ── Hyprland service ──────────────────────────────────────────────────
        mkdir -p "${ROOTFS}/etc/sv/hyprland/log"
        cat > "${ROOTFS}/etc/sv/hyprland/run" <<'EOF'
        #!/bin/sh
        sv check dbus >/dev/null 2>&1 || sleep 2
        export XDG_RUNTIME_DIR="/run/user/1000"
        export XDG_SESSION_TYPE="wayland"
        export XDG_CURRENT_DESKTOP="Hyprland"
        export WLR_RENDERER="gles2"
        export WLR_NO_HARDWARE_CURSORS="1"
        export GBM_BACKEND="virpipe"
        export __GLX_VENDOR_LIBRARY_NAME="mesa"
        export DISPLAY=":0"
        mkdir -p "${XDG_RUNTIME_DIR}"
        chmod 0700 "${XDG_RUNTIME_DIR}"
        chown void:void "${XDG_RUNTIME_DIR}"
        exec chpst -u void:void:video:audio:input dbus-run-session -- Hyprland
        EOF
        chmod +x "${ROOTFS}/etc/sv/hyprland/run"
        cat > "${ROOTFS}/etc/sv/hyprland/log/run" <<'EOF'
        #!/bin/sh
        exec svlogd -tt /var/log/hyprland
        EOF
        chmod +x "${ROOTFS}/etc/sv/hyprland/log/run"
        ln -sf /etc/sv/hyprland "${ROOTFS}/etc/runit/runsvdir/default/hyprland"

        # ── User account ──────────────────────────────────────────────────────
        grep -q "^void:" "${ROOTFS}/etc/passwd" 2>/dev/null || \
          echo "void:x:1000:1000:void,,,:/home/void:/bin/bash" >> "${ROOTFS}/etc/passwd"
        grep -q "^void:" "${ROOTFS}/etc/group" 2>/dev/null || \
          echo "void:x:1000:" >> "${ROOTFS}/etc/group"
        for grp in wheel video audio input network plugdev; do
          grep -q "^${grp}:" "${ROOTFS}/etc/group" && \
            sed -i "/^${grp}:.*/ s/$/,void/" "${ROOTFS}/etc/group" || true
        done
        HASHED=$(openssl passwd -6 "voidarm64")
        grep -q "^void:" "${ROOTFS}/etc/shadow" 2>/dev/null || \
          echo "void:${HASHED}:19000:0:99999:7:::" >> "${ROOTFS}/etc/shadow"
        sed -i "s|^root:[^:]*:|root:${HASHED}:|" "${ROOTFS}/etc/shadow" 2>/dev/null || true

        # ── Desktop configs ───────────────────────────────────────────────────
        mkdir -p "${ROOTFS}/home/void/.config"/{hypr,waybar,wofi,foot,dunst}

        # Hyprland
        cat > "${ROOTFS}/home/void/.config/hypr/hyprland.conf" <<'EOF'
        monitor = , preferred, auto, 1
        exec-once = pipewire
        exec-once = wireplumber
        exec-once = pipewire-pulse
        exec-once = dunst
        exec-once = waybar
        exec-once = nm-applet --indicator
        input {
          kb_layout = us
          follow_mouse = 1
          sensitivity = 0
          touchpad { natural_scroll = true }
        }
        general {
          gaps_in = 4
          gaps_out = 8
          border_size = 2
          col.active_border = rgba(88c0d0ff) rgba(81a1c1ff) 45deg
          col.inactive_border = rgba(2e3440ff)
          layout = dwindle
        }
        decoration {
          rounding = 6
          blur { enabled = false }
          drop_shadow = false
        }
        animations {
          enabled = true
          bezier = easeOut, 0.05, 0.9, 0.1, 1.0
          animation = windows, 1, 4, easeOut
          animation = fade, 1, 4, default
          animation = workspaces, 1, 4, default
        }
        dwindle { pseudotile = true; preserve_split = true }
        misc { force_default_wallpaper = 0; disable_hyprland_logo = true }
        $mod = SUPER
        bind = $mod, Return, exec, foot
        bind = $mod, D, exec, wofi --show drun
        bind = $mod SHIFT, Q, killactive
        bind = $mod SHIFT, E, exit
        bind = $mod, F, fullscreen
        bind = $mod SHIFT, space, togglefloating
        bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
        bind = $mod, h, movefocus, l
        bind = $mod, l, movefocus, r
        bind = $mod, k, movefocus, u
        bind = $mod, j, movefocus, d
        bind = $mod, 1, workspace, 1
        bind = $mod, 2, workspace, 2
        bind = $mod, 3, workspace, 3
        bind = $mod, 4, workspace, 4
        bind = $mod, 5, workspace, 5
        bind = $mod SHIFT, 1, movetoworkspace, 1
        bind = $mod SHIFT, 2, movetoworkspace, 2
        bind = $mod SHIFT, 3, movetoworkspace, 3
        bind = $mod SHIFT, 4, movetoworkspace, 4
        bind = $mod SHIFT, 5, movetoworkspace, 5
        bindm = $mod, mouse:272, movewindow
        bindm = $mod, mouse:273, resizewindow
        bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
        bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
        bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
        EOF

        # Waybar
        cat > "${ROOTFS}/home/void/.config/waybar/config" <<'EOF'
        {"layer":"top","position":"top","height":28,"spacing":4,
        "modules-left":["hyprland/workspaces","hyprland/window"],
        "modules-center":["clock"],"modules-right":["pulseaudio","network","cpu","memory","tray"],
        "hyprland/workspaces":{"format":"{id}","on-click":"activate"},
        "hyprland/window":{"max-length":60},
        "clock":{"format":"{:%a %d %b  %H:%M}"},
        "cpu":{"format":" {usage}%","interval":3},
        "memory":{"format":" {used:0.1f}G","interval":5},
        "pulseaudio":{"format":"{icon} {volume}%","format-muted":"󰝟","format-icons":{"default":["",""," "]},"on-click":"pavucontrol"},
        "network":{"format-wifi":" {essid}","format-ethernet":" {ipaddr}","format-disconnected":"⚠ offline"},
        "tray":{"spacing":8}}
        EOF
        cat > "${ROOTFS}/home/void/.config/waybar/style.css" <<'EOF'
        * { font-family: "Ubuntu", monospace; font-size: 12px; border: none; min-height: 0; }
        window#waybar { background: rgba(46,52,64,0.95); color: #eceff4; }
        #workspaces button { padding: 0 6px; color: #81a1c1; background: transparent; }
        #workspaces button.active { color: #88c0d0; border-bottom: 2px solid #88c0d0; }
        #clock { color: #88c0d0; padding: 0 10px; }
        #cpu { color: #a3be8c; padding: 0 10px; }
        #memory { color: #ebcb8b; padding: 0 10px; }
        #pulseaudio { color: #b48ead; padding: 0 10px; }
        #network { color: #81a1c1; padding: 0 10px; }
        EOF

        # Wofi
        printf 'width=400\nheight=300\nlocation=center\nshow=drun\nprompt=Search...\ngtk_dark=true\nallow_images=true\n' \
          > "${ROOTFS}/home/void/.config/wofi/config"
        cat > "${ROOTFS}/home/void/.config/wofi/style.css" <<'EOF'
        window { background-color: #2e3440; border: 1px solid #4c566a; border-radius: 8px; }
        #input { background-color: #3b4252; color: #eceff4; border: none; border-radius: 4px; margin: 8px; padding: 6px 10px; }
        #entry:selected { background-color: #4c566a; color: #88c0d0; }
        #text { color: #d8dee9; }
        EOF

        # Foot terminal
        cat > "${ROOTFS}/home/void/.config/foot/foot.ini" <<'EOF'
        [main]
        font=monospace:size=11
        dpi-aware=yes
        [colors]
        background=2e3440
        foreground=d8dee9
        regular0=3b4252
        regular1=bf616a
        regular2=a3be8c
        regular3=ebcb8b
        regular4=81a1c1
        regular5=b48ead
        regular6=88c0d0
        regular7=e5e9f0
        EOF

        # Dunst
        cat > "${ROOTFS}/home/void/.config/dunst/dunstrc" <<'EOF'
        [global]
        origin = top-right
        offset = 12x12
        width = 320
        font = Ubuntu 11
        corner_radius = 6
        background = "#2e3440"
        foreground = "#d8dee9"
        timeout = 5
        EOF

        # .bash_profile — auto-launch Hyprland on tty1
        cat > "${ROOTFS}/home/void/.bash_profile" <<'EOF'
        if [ -z "$WAYLAND_DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export XDG_SESSION_TYPE="wayland"
          export XDG_CURRENT_DESKTOP="Hyprland"
          export WLR_RENDERER="gles2"
          export WLR_NO_HARDWARE_CURSORS="1"
          export GBM_BACKEND="virpipe"
          export __GLX_VENDOR_LIBRARY_NAME="mesa"
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          exec dbus-run-session -- Hyprland
        fi
        EOF

        cat > "${ROOTFS}/home/void/.bashrc" <<'EOF'
        export PS1='\[\033[01;32m\]\u@voidarm64\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '
        export EDITOR=vim
        alias ls='ls --color=auto'
        alias ll='ls -lah'
        EOF

        cat > "${ROOTFS}/etc/motd" <<'EOF'

          voidarm64 + Hyprland
          login: void / voidarm64
          Hyprland starts automatically on tty1

        EOF

        chown -R 1000:1000 "${ROOTFS}/home/void"
        chmod 700 "${ROOTFS}/home/void"

        XBPS_ARCH="aarch64" xbps-reconfigure \
          --rootdir="${ROOTFS}" --force --all 2>/dev/null || true

        echo "Rootfs size: $(du -sh ${ROOTFS} | cut -f1)"
      timeout-minutes: 45

    - name: Build ISO
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        ISO_WORK="/tmp/voidarm64-iso"
        ISO_LABEL="VOIDARM64"
        mkdir -p "${ISO_WORK}"/{boot/grub,efi/boot,live}
        mkdir -p output

        # Compress rootfs
        echo "Compressing rootfs..."
        mksquashfs "${ROOTFS}" "${ISO_WORK}/live/filesystem.squashfs" \
          -comp zstd -Xcompression-level 6 -b 1M -noappend \
          -e "${ROOTFS}/proc" -e "${ROOTFS}/sys" \
          -e "${ROOTFS}/dev" -e "${ROOTFS}/run" -e "${ROOTFS}/tmp"
        echo "SquashFS: $(du -sh ${ISO_WORK}/live/filesystem.squashfs | cut -f1)"

        # Copy kernel + initramfs
        KERNEL=$(ls "${ROOTFS}/boot/vmlinuz-"* 2>/dev/null | sort -V | tail -1)
        INITRD=$(ls "${ROOTFS}/boot/initramfs-"* 2>/dev/null | sort -V | tail -1)
        [ -n "$KERNEL" ] || { echo "ERROR: no kernel found"; exit 1; }
        [ -n "$INITRD" ] || { echo "ERROR: no initramfs found"; exit 1; }
        cp "${KERNEL}" "${ISO_WORK}/boot/vmlinuz"
        cp "${INITRD}" "${ISO_WORK}/boot/initramfs"
        echo "Kernel: $(basename $KERNEL)"

        # GRUB config
        cat > "${ISO_WORK}/boot/grub/grub.cfg" <<GRUBEOF
        set default=0
        set timeout=5
        menuentry "voidarm64 + Hyprland" {
          linux  /boot/vmlinuz root=live:CDLABEL=${ISO_LABEL} rd.live.image rd.live.overlay.overlayfs=1 console=ttyAMA0 console=tty0 loglevel=4 quiet
          initrd /boot/initramfs
        }
        GRUBEOF

        # GRUB EFI binary
        grub-mkstandalone \
          --format=arm64-efi \
          --output="${ISO_WORK}/efi/boot/bootaa64.efi" \
          "boot/grub/grub.cfg=${ISO_WORK}/boot/grub/grub.cfg"

        # EFI FAT image
        EFI_IMG="${ISO_WORK}/boot/efi.img"
        dd if=/dev/zero of="${EFI_IMG}" bs=1K count=4096 2>/dev/null
        mkfs.fat -F12 "${EFI_IMG}"
        mmd   -i "${EFI_IMG}" ::/EFI ::/EFI/BOOT
        mcopy -i "${EFI_IMG}" "${ISO_WORK}/efi/boot/bootaa64.efi" ::/EFI/BOOT/

        # Build ISO
        echo "Building ISO..."
        xorriso -as mkisofs \
          -iso-level 3 \
          -volid "${ISO_LABEL}" \
          -full-iso9660-filenames \
          -rational-rock \
          -joliet \
          -e boot/efi.img \
          -no-emul-boot \
          -append_partition 2 0xef "${ISO_WORK}/boot/efi.img" \
          -output "output/voidarm64-hyprland.iso" \
          "${ISO_WORK}" 2>&1 | tail -5

        echo "ISO: $(du -sh output/voidarm64-hyprland.iso | cut -f1)"
      timeout-minutes: 20

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: voidarm64-hyprland
        path: output/voidarm64-hyprland.iso
        retention-days: 7

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: voidarm64 Hyprland — Build ${{ github.run_number }}
        body: |
          ## voidarm64 + Hyprland
          Bootable ISO for UTM on Apple Silicon (M1/M2/M3).
          **Login:** `void` / `voidarm64`
          **UTM display setting:** `virtio-gpu-gl-pci`
        files: output/voidarm64-hyprland.iso
        draft: false
        prerelease: falsename: Build voidarm64 ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build voidarm64 + Hyprland ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Install dependencies
      run: |
        # Remove third-party source files that break with multi-arch
        # (microsoft-prod, azure-cli, github-cli use non-standard formats)
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list
        sudo rm -f /etc/apt/sources.list.d/github-cli.list
        sudo rm -f /etc/apt/sources.list.d/mono-official*.list
        # Remove any .sources (deb822 format) files that may conflict
        sudo rm -f /etc/apt/sources.list.d/*.sources

        # Pin existing repos to amd64 only
        sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
        for f in /etc/apt/sources.list.d/*.list; do
          [ -f "$f" ] && sudo sed -i 's/^deb /deb [arch=amd64] /g' "$f" || true
        done

        # Add Ubuntu ports repo for arm64 packages only
        sudo dpkg --add-architecture arm64
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" \
          | sudo tee /etc/apt/sources.list.d/ports-arm64.list
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" \
          | sudo tee -a /etc/apt/sources.list.d/ports-arm64.list

        export DEBIAN_FRONTEND=noninteractive
        # Remove ALL dpkg post-invoke hooks that fail on GitHub Actions
        # (PackageKit and needrestart both try to use dbus/systemd which aren't running)
        sudo apt-get remove -y --purge needrestart libpython3-dev 2>/dev/null || true
        sudo rm -f /etc/apt/apt.conf.d/20packagekit
        sudo rm -f /usr/share/dbus-1/system-services/org.freedesktop.PackageKit.service
        # Nuke every post-invoke snippet
        sudo rm -f /etc/apt/apt.conf.d/*needrestart*
        sudo rm -f /etc/apt/apt.conf.d/*packagekit*
        sudo rm -f /usr/lib/needrestart/apt-pinvoke
        # Write an apt config that clears ALL Post-Invoke hooks
        cat << 'APTCONF' | sudo tee /etc/apt/apt.conf.d/00no-hooks
DPkg::Post-Invoke { "true"; };
APT::Update::Post-Invoke { "true"; };
APTCONF

        sudo apt-get update -qq
        sudo apt-get install -y \
          xorriso \
          mtools dosfstools e2fsprogs squashfs-tools \
          curl xz-utils rsync openssl \
          qemu-user-static binfmt-support \
          grub-common \
          grub-efi-arm64-bin \
          grub-efi-arm64
        sudo update-binfmts --enable qemu-aarch64 2>/dev/null || true
        echo "grub-mkstandalone: $(which grub-mkstandalone)"

    - name: Install xbps
      run: |
        set -euo pipefail
        curl -fsSL --retry 3 \
          "https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz" \
          -o /tmp/xbps.tar.xz
        mkdir -p /tmp/xbps-static
        tar xf /tmp/xbps.tar.xz -C /tmp/xbps-static
        for bin in xbps-install xbps-query xbps-reconfigure xbps-remove xbps-rindex; do
          FOUND=$(find /tmp/xbps-static -name "${bin}.static" | head -1)
          [ -n "$FOUND" ] && sudo install -m755 "$FOUND" /usr/local/bin/${bin}
        done
        xbps-install --version

    - name: Build rootfs
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        VOID_REPO="https://repo-default.voidlinux.org/current"

        # ── Directory structure ───────────────────────────────────────────────
        mkdir -p "${ROOTFS}"/{dev,proc,sys,run,tmp,var/{log,cache/xbps},etc/xbps.d,boot}
        mkdir -p "${ROOTFS}"/etc/runit/{1,2,3,sv,runsvdir/default}
        mkdir -p "${ROOTFS}"/usr/{bin,lib,sbin,share}
        mkdir -p "${ROOTFS}"/home/void
        chmod 1777 "${ROOTFS}/tmp"

        # ── Install packages ──────────────────────────────────────────────────
        XBPS_ARCH="aarch64" xbps-install \
          --repository="${VOID_REPO}" \
          --rootdir="${ROOTFS}" \
          --sync --yes \
          base-system runit-void linux linux-firmware \
          e2fsprogs dosfstools util-linux \
          wayland wayland-protocols xorg-server-xwayland \
          libdrm mesa mesa-dri \
          hyprland xdg-desktop-portal-hyprland xdg-desktop-portal xdg-user-dirs \
          hyprpaper hypridle \
          wl-clipboard wlr-randr grim slurp swappy \
          waybar otf-font-awesome \
          wofi \
          foot foot-terminfo \
          noto-fonts-ttf noto-fonts-emoji ttf-ubuntu-font-family \
          dunst libnotify \
          pipewire pipewire-pulse wireplumber pavucontrol \
          NetworkManager networkmanager-applet iproute2 openssh \
          xbps bash bash-completion vim curl wget git htop \
          dbus polkit

        # ── System config ─────────────────────────────────────────────────────
        echo "voidarm64" > "${ROOTFS}/etc/hostname"
        echo "LANG=en_US.UTF-8" > "${ROOTFS}/etc/locale.conf"
        cat > "${ROOTFS}/etc/rc.conf" <<'EOF'
        TIMEZONE="UTC"
        HARDWARECLOCK="UTC"
        KEYMAP="us"
        TTYS=2
        EOF

        # ── runit stage 1 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/1" <<'EOF'
        #!/bin/sh
        PATH=/usr/bin:/usr/sbin:/bin:/sbin
        mountpoint -q /proc  || mount -t proc     proc     /proc
        mountpoint -q /sys   || mount -t sysfs    sysfs    /sys
        mountpoint -q /dev   || mount -t devtmpfs devtmpfs /dev
        mkdir -p /dev/{pts,shm}
        mountpoint -q /dev/pts || mount -t devpts devpts /dev/pts
        mountpoint -q /run   || mount -t tmpfs tmpfs /run
        mountpoint -q /tmp   || mount -t tmpfs tmpfs /tmp
        chmod 1777 /dev/shm
        modprobe virtio_gpu 2>/dev/null || true
        modprobe virtio_net 2>/dev/null || true
        modprobe virtio_blk 2>/dev/null || true
        modprobe virtio_rng 2>/dev/null || true
        hostname -F /etc/hostname
        mount -o remount,rw /
        command -v udevd >/dev/null 2>&1 && {
          udevd --daemon; udevadm trigger; udevadm settle
        }
        echo "voidarm64: stage 1 done"
        EOF
        chmod +x "${ROOTFS}/etc/runit/1"

        # ── runit stage 2 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/2" <<'EOF'
        #!/bin/sh
        exec env - PATH=/usr/bin:/usr/sbin:/bin:/sbin \
          runsvdir -P /etc/runit/runsvdir/default 'log: ...........'
        EOF
        chmod +x "${ROOTFS}/etc/runit/2"

        # ── runit stage 3 ─────────────────────────────────────────────────────
        cat > "${ROOTFS}/etc/runit/3" <<'EOF'
        #!/bin/sh
        sv force-stop /etc/runit/runsvdir/default 2>/dev/null || true
        umount -a -r 2>/dev/null || true
        EOF
        chmod +x "${ROOTFS}/etc/runit/3"

        # ── Enable services ───────────────────────────────────────────────────
        for svc in dbus NetworkManager sshd agetty-tty1 agetty-tty2; do
          [ -d "${ROOTFS}/etc/sv/${svc}" ] && \
            ln -sf "/etc/sv/${svc}" "${ROOTFS}/etc/runit/runsvdir/default/${svc}"
        done

        # ── Hyprland service ──────────────────────────────────────────────────
        mkdir -p "${ROOTFS}/etc/sv/hyprland/log"
        cat > "${ROOTFS}/etc/sv/hyprland/run" <<'EOF'
        #!/bin/sh
        sv check dbus >/dev/null 2>&1 || sleep 2
        export XDG_RUNTIME_DIR="/run/user/1000"
        export XDG_SESSION_TYPE="wayland"
        export XDG_CURRENT_DESKTOP="Hyprland"
        export WLR_RENDERER="gles2"
        export WLR_NO_HARDWARE_CURSORS="1"
        export GBM_BACKEND="virpipe"
        export __GLX_VENDOR_LIBRARY_NAME="mesa"
        export DISPLAY=":0"
        mkdir -p "${XDG_RUNTIME_DIR}"
        chmod 0700 "${XDG_RUNTIME_DIR}"
        chown void:void "${XDG_RUNTIME_DIR}"
        exec chpst -u void:void:video:audio:input dbus-run-session -- Hyprland
        EOF
        chmod +x "${ROOTFS}/etc/sv/hyprland/run"
        cat > "${ROOTFS}/etc/sv/hyprland/log/run" <<'EOF'
        #!/bin/sh
        exec svlogd -tt /var/log/hyprland
        EOF
        chmod +x "${ROOTFS}/etc/sv/hyprland/log/run"
        ln -sf /etc/sv/hyprland "${ROOTFS}/etc/runit/runsvdir/default/hyprland"

        # ── User account ──────────────────────────────────────────────────────
        grep -q "^void:" "${ROOTFS}/etc/passwd" 2>/dev/null || \
          echo "void:x:1000:1000:void,,,:/home/void:/bin/bash" >> "${ROOTFS}/etc/passwd"
        grep -q "^void:" "${ROOTFS}/etc/group" 2>/dev/null || \
          echo "void:x:1000:" >> "${ROOTFS}/etc/group"
        for grp in wheel video audio input network plugdev; do
          grep -q "^${grp}:" "${ROOTFS}/etc/group" && \
            sed -i "/^${grp}:.*/ s/$/,void/" "${ROOTFS}/etc/group" || true
        done
        HASHED=$(openssl passwd -6 "voidarm64")
        grep -q "^void:" "${ROOTFS}/etc/shadow" 2>/dev/null || \
          echo "void:${HASHED}:19000:0:99999:7:::" >> "${ROOTFS}/etc/shadow"
        sed -i "s|^root:[^:]*:|root:${HASHED}:|" "${ROOTFS}/etc/shadow" 2>/dev/null || true

        # ── Desktop configs ───────────────────────────────────────────────────
        mkdir -p "${ROOTFS}/home/void/.config"/{hypr,waybar,wofi,foot,dunst}

        # Hyprland
        cat > "${ROOTFS}/home/void/.config/hypr/hyprland.conf" <<'EOF'
        monitor = , preferred, auto, 1
        exec-once = pipewire
        exec-once = wireplumber
        exec-once = pipewire-pulse
        exec-once = dunst
        exec-once = waybar
        exec-once = nm-applet --indicator
        input {
          kb_layout = us
          follow_mouse = 1
          sensitivity = 0
          touchpad { natural_scroll = true }
        }
        general {
          gaps_in = 4
          gaps_out = 8
          border_size = 2
          col.active_border = rgba(88c0d0ff) rgba(81a1c1ff) 45deg
          col.inactive_border = rgba(2e3440ff)
          layout = dwindle
        }
        decoration {
          rounding = 6
          blur { enabled = false }
          drop_shadow = false
        }
        animations {
          enabled = true
          bezier = easeOut, 0.05, 0.9, 0.1, 1.0
          animation = windows, 1, 4, easeOut
          animation = fade, 1, 4, default
          animation = workspaces, 1, 4, default
        }
        dwindle { pseudotile = true; preserve_split = true }
        misc { force_default_wallpaper = 0; disable_hyprland_logo = true }
        $mod = SUPER
        bind = $mod, Return, exec, foot
        bind = $mod, D, exec, wofi --show drun
        bind = $mod SHIFT, Q, killactive
        bind = $mod SHIFT, E, exit
        bind = $mod, F, fullscreen
        bind = $mod SHIFT, space, togglefloating
        bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
        bind = $mod, h, movefocus, l
        bind = $mod, l, movefocus, r
        bind = $mod, k, movefocus, u
        bind = $mod, j, movefocus, d
        bind = $mod, 1, workspace, 1
        bind = $mod, 2, workspace, 2
        bind = $mod, 3, workspace, 3
        bind = $mod, 4, workspace, 4
        bind = $mod, 5, workspace, 5
        bind = $mod SHIFT, 1, movetoworkspace, 1
        bind = $mod SHIFT, 2, movetoworkspace, 2
        bind = $mod SHIFT, 3, movetoworkspace, 3
        bind = $mod SHIFT, 4, movetoworkspace, 4
        bind = $mod SHIFT, 5, movetoworkspace, 5
        bindm = $mod, mouse:272, movewindow
        bindm = $mod, mouse:273, resizewindow
        bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
        bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
        bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
        EOF

        # Waybar
        cat > "${ROOTFS}/home/void/.config/waybar/config" <<'EOF'
        {"layer":"top","position":"top","height":28,"spacing":4,
        "modules-left":["hyprland/workspaces","hyprland/window"],
        "modules-center":["clock"],"modules-right":["pulseaudio","network","cpu","memory","tray"],
        "hyprland/workspaces":{"format":"{id}","on-click":"activate"},
        "hyprland/window":{"max-length":60},
        "clock":{"format":"{:%a %d %b  %H:%M}"},
        "cpu":{"format":" {usage}%","interval":3},
        "memory":{"format":" {used:0.1f}G","interval":5},
        "pulseaudio":{"format":"{icon} {volume}%","format-muted":"󰝟","format-icons":{"default":["",""," "]},"on-click":"pavucontrol"},
        "network":{"format-wifi":" {essid}","format-ethernet":" {ipaddr}","format-disconnected":"⚠ offline"},
        "tray":{"spacing":8}}
        EOF
        cat > "${ROOTFS}/home/void/.config/waybar/style.css" <<'EOF'
        * { font-family: "Ubuntu", monospace; font-size: 12px; border: none; min-height: 0; }
        window#waybar { background: rgba(46,52,64,0.95); color: #eceff4; }
        #workspaces button { padding: 0 6px; color: #81a1c1; background: transparent; }
        #workspaces button.active { color: #88c0d0; border-bottom: 2px solid #88c0d0; }
        #clock { color: #88c0d0; padding: 0 10px; }
        #cpu { color: #a3be8c; padding: 0 10px; }
        #memory { color: #ebcb8b; padding: 0 10px; }
        #pulseaudio { color: #b48ead; padding: 0 10px; }
        #network { color: #81a1c1; padding: 0 10px; }
        EOF

        # Wofi
        printf 'width=400\nheight=300\nlocation=center\nshow=drun\nprompt=Search...\ngtk_dark=true\nallow_images=true\n' \
          > "${ROOTFS}/home/void/.config/wofi/config"
        cat > "${ROOTFS}/home/void/.config/wofi/style.css" <<'EOF'
        window { background-color: #2e3440; border: 1px solid #4c566a; border-radius: 8px; }
        #input { background-color: #3b4252; color: #eceff4; border: none; border-radius: 4px; margin: 8px; padding: 6px 10px; }
        #entry:selected { background-color: #4c566a; color: #88c0d0; }
        #text { color: #d8dee9; }
        EOF

        # Foot terminal
        cat > "${ROOTFS}/home/void/.config/foot/foot.ini" <<'EOF'
        [main]
        font=monospace:size=11
        dpi-aware=yes
        [colors]
        background=2e3440
        foreground=d8dee9
        regular0=3b4252
        regular1=bf616a
        regular2=a3be8c
        regular3=ebcb8b
        regular4=81a1c1
        regular5=b48ead
        regular6=88c0d0
        regular7=e5e9f0
        EOF

        # Dunst
        cat > "${ROOTFS}/home/void/.config/dunst/dunstrc" <<'EOF'
        [global]
        origin = top-right
        offset = 12x12
        width = 320
        font = Ubuntu 11
        corner_radius = 6
        background = "#2e3440"
        foreground = "#d8dee9"
        timeout = 5
        EOF

        # .bash_profile — auto-launch Hyprland on tty1
        cat > "${ROOTFS}/home/void/.bash_profile" <<'EOF'
        if [ -z "$WAYLAND_DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export XDG_SESSION_TYPE="wayland"
          export XDG_CURRENT_DESKTOP="Hyprland"
          export WLR_RENDERER="gles2"
          export WLR_NO_HARDWARE_CURSORS="1"
          export GBM_BACKEND="virpipe"
          export __GLX_VENDOR_LIBRARY_NAME="mesa"
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          exec dbus-run-session -- Hyprland
        fi
        EOF

        cat > "${ROOTFS}/home/void/.bashrc" <<'EOF'
        export PS1='\[\033[01;32m\]\u@voidarm64\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '
        export EDITOR=vim
        alias ls='ls --color=auto'
        alias ll='ls -lah'
        EOF

        cat > "${ROOTFS}/etc/motd" <<'EOF'

          voidarm64 + Hyprland
          login: void / voidarm64
          Hyprland starts automatically on tty1

        EOF

        chown -R 1000:1000 "${ROOTFS}/home/void"
        chmod 700 "${ROOTFS}/home/void"

        XBPS_ARCH="aarch64" xbps-reconfigure \
          --rootdir="${ROOTFS}" --force --all 2>/dev/null || true

        echo "Rootfs size: $(du -sh ${ROOTFS} | cut -f1)"
      timeout-minutes: 45

    - name: Build ISO
      run: |
        set -euo pipefail
        export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
        ROOTFS="/tmp/voidarm64-rootfs"
        ISO_WORK="/tmp/voidarm64-iso"
        ISO_LABEL="VOIDARM64"
        mkdir -p "${ISO_WORK}"/{boot/grub,efi/boot,live}
        mkdir -p output

        # Compress rootfs
        echo "Compressing rootfs..."
        mksquashfs "${ROOTFS}" "${ISO_WORK}/live/filesystem.squashfs" \
          -comp zstd -Xcompression-level 6 -b 1M -noappend \
          -e "${ROOTFS}/proc" -e "${ROOTFS}/sys" \
          -e "${ROOTFS}/dev" -e "${ROOTFS}/run" -e "${ROOTFS}/tmp"
        echo "SquashFS: $(du -sh ${ISO_WORK}/live/filesystem.squashfs | cut -f1)"

        # Copy kernel + initramfs
        KERNEL=$(ls "${ROOTFS}/boot/vmlinuz-"* 2>/dev/null | sort -V | tail -1)
        INITRD=$(ls "${ROOTFS}/boot/initramfs-"* 2>/dev/null | sort -V | tail -1)
        [ -n "$KERNEL" ] || { echo "ERROR: no kernel found"; exit 1; }
        [ -n "$INITRD" ] || { echo "ERROR: no initramfs found"; exit 1; }
        cp "${KERNEL}" "${ISO_WORK}/boot/vmlinuz"
        cp "${INITRD}" "${ISO_WORK}/boot/initramfs"
        echo "Kernel: $(basename $KERNEL)"

        # GRUB config
        cat > "${ISO_WORK}/boot/grub/grub.cfg" <<GRUBEOF
        set default=0
        set timeout=5
        menuentry "voidarm64 + Hyprland" {
          linux  /boot/vmlinuz root=live:CDLABEL=${ISO_LABEL} rd.live.image rd.live.overlay.overlayfs=1 console=ttyAMA0 console=tty0 loglevel=4 quiet
          initrd /boot/initramfs
        }
        GRUBEOF

        # GRUB EFI binary
        grub-mkstandalone \
          --format=arm64-efi \
          --output="${ISO_WORK}/efi/boot/bootaa64.efi" \
          "boot/grub/grub.cfg=${ISO_WORK}/boot/grub/grub.cfg"

        # EFI FAT image
        EFI_IMG="${ISO_WORK}/boot/efi.img"
        dd if=/dev/zero of="${EFI_IMG}" bs=1K count=4096 2>/dev/null
        mkfs.fat -F12 "${EFI_IMG}"
        mmd   -i "${EFI_IMG}" ::/EFI ::/EFI/BOOT
        mcopy -i "${EFI_IMG}" "${ISO_WORK}/efi/boot/bootaa64.efi" ::/EFI/BOOT/

        # Build ISO
        echo "Building ISO..."
        xorriso -as mkisofs \
          -iso-level 3 \
          -volid "${ISO_LABEL}" \
          -full-iso9660-filenames \
          -rational-rock \
          -joliet \
          -e boot/efi.img \
          -no-emul-boot \
          -append_partition 2 0xef "${ISO_WORK}/boot/efi.img" \
          -output "output/voidarm64-hyprland.iso" \
          "${ISO_WORK}" 2>&1 | tail -5

        echo "ISO: $(du -sh output/voidarm64-hyprland.iso | cut -f1)"
      timeout-minutes: 20

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: voidarm64-hyprland
        path: output/voidarm64-hyprland.iso
        retention-days: 7

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: voidarm64 Hyprland — Build ${{ github.run_number }}
        body: |
          ## voidarm64 + Hyprland
          Bootable ISO for UTM on Apple Silicon (M1/M2/M3).
          **Login:** `void` / `voidarm64`
          **UTM display setting:** `virtio-gpu-gl-pci`
        files: output/voidarm64-hyprland.iso
        draft: false
        prerelease: false
